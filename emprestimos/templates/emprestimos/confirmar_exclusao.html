<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar Exclusão</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1>Confirmar Exclusão</h1>

    <div class="mb-3">
        <a href="{% url 'menu_principal' %}" class="btn btn-secondary me-2">Voltar ao menu</a>
        <a href="{% url 'emprestimos_lista' %}" class="btn btn-outline-secondary">Voltar à lista</a>
    </div>

    <p>
        Tem certeza que deseja excluir o empréstimo de
        <strong>{{ obj.colaborador.nome }}</strong>
        para o equipamento
        <strong>{{ obj.equipamento.nome }}</strong>?
    </p>

    <form method="post">
        {% csrf_token %}

        <button type="submit" class="btn btn-danger">Sim, Excluir</button>
        <a href="{% url 'emprestimos_lista' %}" class="btn btn-secondary">Cancelar</a>

    </form>

</div>

</body>
</html>
