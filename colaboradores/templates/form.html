<!DOCTYPE html>
<html lang="pt-br">
<!-- Bootstrap CSS  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts-->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style> 
    body {
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(145deg, #eef2f7 0%, #d9ece9 100%);
        min-height: 75vh;
        padding: 2rem 1.5rem;
    }
    h1 {
        color: #343a40;
        margin-bottom: 20px;
    }
    .table {
        background-color: #ffffff;
    }
    .btn-primary {
        background-color: #007bff;
        border-color: #007bff;
    }
    </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if obj %}Editar{% else %}Cadastrar{% endif %} Colaborador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>{% if obj %}Editar{% else %}Cadastrar{% endif %} Colaborador</h1>
        <div class="mb-3">
            <a href="{% url 'menu_principal' %}" class="btn btn-secondary me-2">Voltar ao menu</a>
            <a href="{% url 'lista' %}" class="btn btn-outline-secondary">Voltar à lista</a>
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome" value="{% if obj %}{{ obj.nome }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="cpf" class="form-label">CPF</label>
                <input type="text" class="form-control" id="cpf" name="cpf" value="{% if obj %}{{ obj.cpf }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="cargo" class="form-label">Cargo</label>
                <input type="text" class="form-control" id="cargo" name="cargo" value="{% if obj %}{{ obj.cargo }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="setor" class="form-label">Setor</label>
                <input type="text" class="form-control" id="setor" name="setor" value="{% if obj %}{{ obj.setor }}{% endif %}" required>
            </div>
            <button type="submit" class="btn btn-primary">{% if obj %}Atualizar{% else %}Criar{% endif %}</button>
            <a href="{% url 'lista' %}" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
