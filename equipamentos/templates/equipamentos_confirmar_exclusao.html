<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmar exclusão de equipamento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9ece9 100%);
            min-height: 75vh;
            padding: 2rem 1.5rem;
        }
        h1 {
            color: #343a40;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>Confirmar exclusão</h1>
        <div class="mb-3">
            <a href="{% url 'menu_principal' %}" class="btn btn-secondary me-2">Voltar ao menu</a>
            <a href="{% url 'equipamentos_lista' %}" class="btn btn-outline-secondary">Voltar à lista</a>
        </div>
        <p>Tem certeza que deseja excluir o equipamento <strong>{{ obj.nome }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Sim, excluir</button>
            <a href="{% url 'equipamentos_lista' %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
