<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if obj %}Editar{% else %}Cadastrar{% endif %} Equipamento de EPI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(145deg, #eef2f7 0%, #d9ece9 100%);
            min-height: 75vh;
            padding: 2rem 1.5rem;
        }
        h1 {
            color: #343a40;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1>{% if obj %}Editar{% else %}Cadastrar{% endif %} Equipamento de EPI</h1>
        <div class="mb-3">
            <a href="{% url 'menu_principal' %}" class="btn btn-secondary me-2">Voltar ao menu</a>
            <a href="{% url 'equipamentos_lista' %}" class="btn btn-outline-secondary">Voltar à lista</a>
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome" value="{% if obj %}{{ obj.nome }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="codigo" class="form-label">Código</label>
                <input type="text" class="form-control" id="codigo" name="codigo" value="{% if obj %}{{ obj.codigo }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="tipo" class="form-label">Tipo</label>
                <input type="text" class="form-control" id="tipo" name="tipo" value="{% if obj %}{{ obj.tipo }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="classe_risco" class="form-label">Classe de Risco</label>
                <input type="text" class="form-control" id="classe_risco" name="classe_risco" value="{% if obj %}{{ obj.classe_risco }}{% endif %}" required>
            </div>
            <div class="mb-3">
                <label for="data_aquisicao" class="form-label">Data de Aquisição</label>
                <input type="date" class="form-control" id="data_aquisicao" name="data_aquisicao" value="{% if obj %}{{ obj.data_aquisicao }}{% endif %}">
            </div>
            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="ativo" name="ativo" {% if obj and obj.ativo %}checked{% endif %}>
                <label class="form-check-label" for="ativo">Ativo</label>
            </div>
            <button type="submit" class="btn btn-primary">{% if obj %}Atualizar{% else %}Criar{% endif %}</button>
            <a href="{% url 'equipamentos_lista' %}" class="btn btn-secondary">Voltar</a>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
